name: Publish

# Publishes @promptctl/tmux-control-mode-js to npm when a GitHub Release
# is published. prepublishOnly runs check:deps (guards against runtime
# dep leaks) + build, so the tarball is always built from a clean tree.

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # required for npm --provenance
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          cache: npm

      - run: npm ci

      # Full CI gate before publishing — if tests fail, the release tag is
      # created but nothing ships.
      - run: npm run lint
      - run: npm run format:check
      - run: npm run typecheck
      - run: npm test

      - run: npm publish --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
